<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mural de Recados — Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-layout">
    <div class="auth-deco auth-deco-alt">
      <div class="deco-circle deco-1"></div>
      <div class="deco-circle deco-2"></div>
      <div class="deco-circle deco-3"></div>
      <div class="brand-tagline">
        <span class="brand-icon">✦</span>
        <h1 class="brand-name">Mural</h1>
        <p class="brand-sub">Crie sua conta</p>
      </div>
    </div>

    <div class="auth-form-wrap">
      <div class="auth-card">
        <div class="auth-card-header">
          <h2>Criar conta</h2>
          <p>Preencha os dados abaixo para se cadastrar</p>
        </div>

        <div id="msg-error" class="msg msg-error hidden"></div>
        <div id="msg-success" class="msg msg-success hidden"></div>

        <form id="form-cadastro" novalidate>
          <div class="field-group">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome" autocomplete="name">
            <span class="field-error" id="err-nome"></span>
          </div>

          <div class="field-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email">
            <span class="field-error" id="err-email"></span>
          </div>

          <div class="field-group">
            <label for="senha">Senha</label>
            <div class="input-wrap">
              <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
              <button type="button" class="toggle-pw" onclick="toggleSenha('senha')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="err-senha"></span>
          </div>

          <div class="field-group">
            <label for="confirmar">Confirmar senha</label>
            <div class="input-wrap">
              <input type="password" id="confirmar" name="confirmar" placeholder="Repita a senha" autocomplete="new-password">
              <button type="button" class="toggle-pw" onclick="toggleSenha('confirmar')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="err-confirmar"></span>
          </div>

          <button type="submit" class="btn-primary" id="btn-cadastro">
            <span class="btn-text">Criar conta</span>
            <span class="btn-loader hidden">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin"><path d="M21 12a9 9 0 1 1-18 0"/></svg>
            </span>
          </button>
        </form>

        <div class="auth-footer">
          <p>Já tem conta? <a href="login.html">Entrar</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = 'index.html';

    document.getElementById('form-cadastro').addEventListener('submit', async function(e) {
      e.preventDefault();
      clearErrors();

      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const confirmar = document.getElementById('confirmar').value;
      let valid = true;

      if (!nome || nome.length < 2) { showFieldError('err-nome', 'Informe seu nome completo'); valid = false; }
      if (!email) { showFieldError('err-email', 'Informe seu e-mail'); valid = false; }
      else if (!/\S+@\S+\.\S+/.test(email)) { showFieldError('err-email', 'E-mail inválido'); valid = false; }
      if (!senha || senha.length < 6) { showFieldError('err-senha', 'Senha deve ter no mínimo 6 caracteres'); valid = false; }
      if (senha !== confirmar) { showFieldError('err-confirmar', 'As senhas não coincidem'); valid = false; }

      if (!valid) return;

      setBtnLoading('btn-cadastro', true);

      try {
        const result = await API.cadastro(nome, email, senha);
        if (result.success) {
          showMsg('msg-success', 'Conta criada! Redirecionando para o login...');
          setTimeout(() => window.location.href = 'login.html', 1200);
        } else {
          showMsg('msg-error', result.message || 'Erro ao criar conta');
        }
      } catch(err) {
        showMsg('msg-error', 'Erro ao conectar. Tente novamente.');
      }

      setBtnLoading('btn-cadastro', false);
    });
  </script>
</body>
</html>
